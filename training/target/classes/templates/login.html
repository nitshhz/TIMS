<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <!-- connect css -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="box">

    <h2>Login</h2>

    <!-- login form -->
    <form action="/login" method="post">

        <!-- username -->
        <label>Username</label>
        <input type="text" name="username" required>

        <!-- password -->
        <label>Password</label>
        <input type="password" name="password" required>

        <!-- button -->
        <button>Login</button>

    </form>

</div>

</body>
</html>
