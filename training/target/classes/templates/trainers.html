<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Trainers | Modern Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="navbar">
    <span>InstituteHQ</span>
    <a th:href="@{/dashboard}"><- Back to Dashboard</a>
</div>

<div class="container">

    <div class="flex-header">
        <div>
            <h2>Instructor Staff</h2>
            <p style="color: var(--text-muted); font-size: 15px;">Onboard and assign teaching staff to courses.</p>
        </div>
    </div>

    <!-- inline premium form -->
    <form th:action="@{/saveTrainer}" method="post" class="flex-row" style="gap: 15px;">
        <div style="flex: 1; min-width: 150px;">
            <input type="text" name="name" placeholder="Full Name" required>
        </div>
        <div style="flex: 1; min-width: 150px;">
            <input type="text" name="subject" placeholder="Subject" required>
        </div>
        <div style="flex: 1; min-width: 150px;">
            <input type="text" name="phone" placeholder="Phone (10 digits)" required pattern="[0-9]{10}">
        </div>
        <div style="flex: 1; min-width: 180px;">
            <select name="course.id">
                <option value="" selected>Select Course (Optional)</option>
                <option th:each="c : ${courses}" th:value="${c.id}" th:text="${c.name}"></option>
            </select>
        </div>
        <button type="submit" style="margin-top: 0; padding: 12px 30px;">+ Invite</button>
    </form>

    <div class="table-wrapper">
        <table>
            <tr>
                <th>ID</th>
                <th>Instructor Name</th>
                <th>Specialization</th>
                <th>Contact</th>
                <th>Assigned Course</th>
                <th style="text-align: right;">Action</th>
            </tr>
            <tr th:each="t : ${list}">
                <td th:text="'#' + ${t.id}" style="color: var(--text-muted); font-weight: 500;"></td>
                <td th:text="${t.name}" style="font-weight: 600;"></td>
                <td th:text="${t.subject}"></td>
                <td th:text="${t.phone}"></td>
                <td>
                    <span th:if="${t.course != null}" style="background: rgba(16, 185, 129, 0.1); color: var(--success); padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600;" th:text="${t.course.name}"></span>
                    <span th:unless="${t.course != null}" style="color: var(--text-muted); font-size: 12px;">Floating</span>
                </td>
                <td style="text-align: right; display: flex; gap: 8px; justify-content: flex-end;">
                    <a th:href="@{'/editTrainer/' + ${t.id}}" style="text-decoration: none;">
                        <button class="btn-edit">Edit</button>
                    </a>
                    <a th:href="@{'/deleteTrainer/' + ${t.id}}" style="text-decoration: none;">
                        <button class="btn-danger">Dismiss</button>
                    </a>
                </td>
            </tr>
        </table>
    </div>

</div>

<script th:src="@{/js/theme.js}"></script>
</body>
</html>
