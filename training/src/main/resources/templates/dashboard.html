<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Modern Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- top bar -->
<div class="navbar">
    <span>InstituteHQ</span>
    <div>
        <span style="font-size: 14px; font-weight: 500; color: var(--text-muted); margin-right: 20px;">Welcome back!</span>
        <a th:href="@{/logout}" class="link" style="border: 1px solid var(--border);">Logout -></a>
    </div>
</div>

<div class="container">

    <div class="flex-header">
        <div>
            <h2>Dashboard Overview</h2>
            <p style="color: var(--text-muted); font-size: 15px;">Monitor your entire training center analytics here.</p>
        </div>
    </div>

    <!-- animated cards connected to urls -->
    <div class="cards">

        <a th:href="@{/students}" class="card c1" style="text-decoration: none;">
            <div class="title">Total Students</div>
            <div class="value" th:text="${students}"></div>
        </a>

        <a th:href="@{/courses}" class="card c2" style="text-decoration: none;">
            <div class="title">Active Courses</div>
            <div class="value" th:text="${courses}"></div>
        </a>

        <a th:href="@{/trainers}" class="card c3" style="text-decoration: none;">
            <div class="title">Trainers</div>
            <div class="value" th:text="${trainers}"></div>
        </a>

        <a th:href="@{/fees}" class="card c4" style="text-decoration: none;">
            <div class="title">Fee Records</div>
            <div class="value" th:text="${fees}"></div>
        </a>

    </div>

</div>

<script th:src="@{/js/theme.js}"></script>
</body>
</html>
