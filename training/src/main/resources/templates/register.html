<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register | Modern Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="box">

    <h2>Create Account ✨</h2>
    <p class="auth-header-text">Join the institute management system.</p>

    <!-- register form -->
    <form th:action="@{/saveUser}" method="post">

        <label>Username</label>
        <input type="text" name="username" placeholder="Choose a username" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Create a strong password" required>

        <button type="submit" style="margin-top: 15px;">Sign Up Now</button>
        
        <a th:href="@{/login}" class="link-btn" style="text-align: center; margin-top: 10px;">Already have an account? Log in</a>

    </form>

</div>

<script th:src="@{/js/theme.js}"></script>
</body>
</html>
