<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Course | Modern Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="navbar">
    <span>InstituteHQ</span>
    <a th:href="@{/courses}"><- Back to Courses</a>
</div>

<div class="box">
    <h2>Edit Course</h2>
    <p class="auth-header-text">Update the details for this course.</p>

    <!-- edit form -->
    <form th:action="@{/saveCourse}" method="post">
        
        <!-- HIDDEN ID to trigger an update -->
        <input type="hidden" name="id" th:value="${course.id}">

        <label>Course Name</label>
        <input type="text" name="name" th:value="${course.name}" required>

        <label>Duration</label>
        <input type="text" name="duration" th:value="${course.duration}" required>

        <label>Tuition Fee (₹)</label>
        <input type="number" step="0.01" name="fee" th:value="${course.fee}" required min="0.01">

        <button type="submit" style="margin-top: 15px;">Update Course</button>
        
        <a th:href="@{/courses}" class="link-btn" style="text-align: center; margin-top: 10px;">Cancel</a>

    </form>
</div>

<script th:src="@{/js/theme.js}"></script>
</body>
</html>
