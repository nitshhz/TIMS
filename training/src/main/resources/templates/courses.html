<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Courses | Modern Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="navbar">
    <span>InstituteHQ</span>
    <a th:href="@{/dashboard}"><- Back to Dashboard</a>
</div>

<div class="container">

    <div class="flex-header">
        <div>
            <h2>Course Catalog</h2>
            <p style="color: var(--text-muted); font-size: 15px;">Add and monitor education curricula.</p>
        </div>
    </div>

    <!-- inline premium form -->
    <form th:action="@{/saveCourse}" method="post" class="flex-row" style="gap: 15px;">
        <div style="flex: 1; min-width: 250px;">
            <input type="text" name="name" placeholder="Course Name (e.g. Java Mastery)" required>
        </div>
        <div style="flex: 1; min-width: 200px;">
            <input type="text" name="duration" placeholder="Duration (e.g. 3 Months)" required>
        </div>
        <div style="flex: 1; min-width: 150px;">
            <input type="number" step="0.01" name="fee" placeholder="Cost (₹)" required min="0.01">
        </div>
        <button type="submit" style="margin-top: 0; padding: 12px 30px;">+ Add</button>
    </form>

    <!-- styling isolated table wrapper -->
    <div class="table-wrapper">
        <table>
            <tr>
                <th>ID</th>
                <th>Course Name</th>
                <th>Duration</th>
                <th>Tuition Fee</th>
                <th style="text-align: right;">Action</th>
            </tr>
            <tr th:each="c : ${list}">
                <td th:text="'#' + ${c.id}" style="color: var(--text-muted); font-weight: 500;"></td>
                <td th:text="${c.name}" style="font-weight: 600;"></td>
                <td th:text="${c.duration}"></td>
                <td th:text="'₹' + ${c.fee}"></td>
                <td style="text-align: right; display: flex; gap: 8px; justify-content: flex-end;">
                    <a th:href="@{'/editCourse/' + ${c.id}}" style="text-decoration: none;">
                        <button class="btn-edit">Edit</button>
                    </a>
                    <a th:href="@{'/deleteCourse/' + ${c.id}}" style="text-decoration: none;">
                        <button class="btn-danger">Revoke</button>
                    </a>
                </td>
            </tr>
        </table>
    </div>

</div>

<script th:src="@{/js/theme.js}"></script>
</body>
</html>
