<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Courses</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="navbar">
    <span>Course Management</span>
    <a th:href="@{/dashboard}">Back</a>
</div>

<div class="container">

    <h2>Courses List</h2>

    <!-- form -->
    <form th:action="@{/saveCourse}" method="post">
        <input type="text" name="name" placeholder="Course Name" required>
        <input type="text" name="duration" placeholder="Duration" required>
        <input type="text" name="fee" placeholder="Fee" required>
        <button type="submit">Add Course</button>
    </form>

    <br><br>

    <table border="1">

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Duration</th>
            <th>Fee</th>
            <th>Action</th>
        </tr>

        <tr th:each="c : ${list}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.name}"></td>
            <td th:text="${c.duration}"></td>
            <td th:text="${c.fee}"></td>

            <td>
                <a th:href="@{'/deleteCourse/' + ${c.id}}">
                    <button>Delete</button>
                </a>
            </td>
        </tr>

    </table>

</div>

</body>
</html>
