<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Fee Transactions | Modern Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="navbar">
    <span>InstituteHQ</span>
    <a th:href="@{/dashboard}"><- Back to Dashboard</a>
</div>

<div class="container">

    <div class="flex-header">
        <div>
            <h2>Fee Records</h2>
            <p style="color: var(--text-muted); font-size: 15px;">Log and monitor financial transactions securely.</p>
        </div>
    </div>

    <!-- inline premium form -->
    <form th:action="@{/saveFee}" method="post" class="flex-row" style="gap: 15px;">
        <div style="flex: 1; min-width: 150px;">
            <select name="student.id" required>
                <option value="" disabled selected>Student</option>
                <option th:each="s : ${students}" th:value="${s.id}" th:text="${s.name}"></option>
            </select>
        </div>
        <div style="flex: 1; min-width: 150px;">
            <select name="course.id" required>
                <option value="" disabled selected>Course</option>
                <option th:each="c : ${courses}" th:value="${c.id}" th:text="${c.name}"></option>
            </select>
        </div>
        <div style="flex: 1; min-width: 120px;">
            <input type="number" step="0.01" name="amount" placeholder="Amount (₹)" required min="0.01">
        </div>
        <div style="flex: 1; min-width: 130px;">
            <input type="date" name="paymentDate" required>
        </div>
        <div style="flex: 1; min-width: 130px;">
            <select name="paymentMode" required>
                <option value="" disabled selected>Method</option>
                <option value="Cash">Cash</option>
                <option value="Credit Card">Credit Card</option>
                <option value="UPI">UPI / Transfer</option>
            </select>
        </div>
        <button type="submit" style="margin-top: 0; padding: 12px 30px;">+ Record</button>
    </form>

    <div class="table-wrapper">
        <table>
            <tr>
                <th>Txn ID</th>
                <th>Student</th>
                <th>Course Covered</th>
                <th>Amount</th>
                <th>Date Paid</th>
                <th>Method</th>
                <th style="text-align: right;">Action</th>
            </tr>
            <tr th:each="f : ${list}">
                <td th:text="'#' + ${f.id}" style="color: var(--text-muted); font-weight: 500;"></td>
                <td th:text="${f.student != null ? f.student.name : 'Unknown'}" style="font-weight: 600;"></td>
                <td th:text="${f.course != null ? f.course.name : 'Unknown'}"></td>
                <td th:text="'₹' + ${f.amount}" style="color: var(--success); font-weight: 600;"></td>
                <td th:text="${f.date}"></td>
                <td>
                    <span style="background: rgba(245, 158, 11, 0.1); color: #d97706; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600;" th:text="${f.paymentMode}"></span>
                </td>
                <td style="text-align: right; display: flex; gap: 8px; justify-content: flex-end;">
                    <a th:href="@{'/editFee/' + ${f.id}}" style="text-decoration: none;">
                        <button class="btn-edit">Edit</button>
                    </a>
                    <a th:href="@{'/deleteFee/' + ${f.id}}" style="text-decoration: none;">
                        <button class="btn-danger">Refund</button>
                    </a>
                </td>
            </tr>
        </table>
    </div>

</div>

<script th:src="@{/js/theme.js}"></script>
</body>
</html>
